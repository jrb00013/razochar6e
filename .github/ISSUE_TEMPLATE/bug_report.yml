name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: probe
    attributes:
      label: Probe output
      description: Run `razochar6e probe --json` (and `razochar6e wsl probe` on WSL)
      render: shell
    validations:
      required: true
  - type: input
    id: model
    attributes:
      label: Laptop model
      placeholder: e.g. ASUS ROG Strix G16
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. Windows 11 + WSL2 Ubuntu 24.04
    validations:
      required: true
